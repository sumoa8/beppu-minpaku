<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民泊テスト宿泊会 ツール集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* CSSは元のままのため省略（中略） */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --navy: #1a3a5c; --navy2: #2a5280; --orange: #e67e22; --orange2:#f39c12; --purple: #8e44ad; --purple2:#9b59b6; --green: #27ae60; --green2: #2ecc71; --bg: #f0f4f8; --card: #ffffff; --text: #1a2a3a; --sub: #5d7a8c; --radius: 20px; }
body { font-family: 'Noto Sans JP', system-ui, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
.hero { background: linear-gradient(145deg, #0d2137 0%, #1a3a5c 50%, #2a5280 100%); padding: 52px 20px 48px; text-align: center; position: relative; overflow: hidden; }
.hero-emoji { font-size: 3rem; display: block; margin-bottom: 12px; animation: pulse 3s ease-in-out infinite; }
.hero h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 10px; }
.hero-sub { font-size: 0.88rem; color: rgba(255,255,255,0.65); margin-bottom: 20px; line-height: 1.6; }
.container { max-width: 480px; margin: 0 auto; padding: 28px 16px 40px; }
.section-label { font-size: 0.72rem; font-weight: 700; color: var(--sub); text-transform: uppercase; margin-bottom: 16px; }
.app-card { background: var(--card); border-radius: var(--radius); margin-bottom: 16px; box-shadow: 0 4px 20px rgba(26,58,92,0.09); overflow: hidden; text-decoration: none; display: block; color: inherit; transition: transform 0.22s ease; border: 1px solid rgba(26,58,92,0.07); }
.app-card:hover { transform: translateY(-4px); }
.card-accent { height: 6px; width: 100%; }
.accent-navy { background: var(--navy); } .accent-orange { background: var(--orange); } .accent-purple { background: var(--purple); }
.card-body { padding: 22px 22px 20px; }
.card-icon-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.card-icon-wrap { width: 54px; height: 54px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; }
.icon-purple { background: #f0e8f8; }
.card-title { font-size: 1.05rem; font-weight: 700; }
.card-desc { font-size: 0.84rem; color: var(--sub); line-height: 1.65; margin-bottom: 16px; }
.card-cta { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 12px; font-size: 0.88rem; font-weight: 700; color: #fff; }
.cta-purple { background: var(--purple); }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
</style>
</head>
<body>

<div class="hero">
  <span class="hero-emoji">🏠</span>
  <h1>民泊テスト宿泊会<br>ツール集</h1>
  <p class="hero-sub">別府民泊の体験をより良くするための<br>3つのWebアプリをご利用ください</p>
</div>

<div class="container">
  <div class="section-label">📱 アプリ一覧</div>

  <a class="app-card" href="./app1_アメニティチェック.html">
    <div class="card-accent accent-navy"></div>
    <div class="card-body">
      <div class="card-title">アメニティチェックリスト</div>
      <p class="card-desc">石口さん用。物件に「ないもの」を記録します。</p>
      <div class="card-cta cta-navy" style="background:#1a3a5c">開く</div>
    </div>
  </a>

  <a class="app-card" href="./app2_アンケート.html">
    <div class="card-accent accent-orange"></div>
    <div class="card-body">
      <div class="card-title">民泊評価アンケート</div>
      <p class="card-desc">全員用。寝心地や設備を5つ星で評価します。</p>
      <div class="card-cta cta-orange" style="background:#e67e22">開く</div>
    </div>
  </a>

  <a class="app-card" href="./app3_idea_board.html">
    <div class="card-accent accent-purple"></div>
    <div class="card-body">
      <div class="card-icon-row">
        <div class="card-icon-wrap icon-purple">🥃</div>
        <div class="card-meta">
          <div class="card-number">APP 03</div>
          <div class="card-title">焼酎×たこ焼き<br>企画アイデアボード</div>
        </div>
      </div>
      <p class="card-desc">ペアリング記録、イベント化アイデアの付箋メモ、総評をまとめます。</p>
      <div class="card-cta cta-purple">
        アイデアボードを開く
        <span class="cta-arrow">→</span>
      </div>
    </div>
  </a>
</div>

</body>
</html>
